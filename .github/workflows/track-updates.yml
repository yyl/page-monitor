name: Track Site Updates

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

jobs:
  check-updates:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Restore cached state
        uses: actions/cache/restore@v5
        with:
          path: .cache/tracker/state.json
          key: ${{ runner.os }}-tracker-state
          restore-keys: |
            ${{ runner.os }}-tracker-state-

      - name: Check tracked targets
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python scripts/check_updates.py --state-path .cache/tracker/state.json

      - name: Save updated state
        if: success()
        uses: actions/cache/save@v5
        with:
          path: .cache/tracker/state.json
          key: ${{ runner.os }}-tracker-state-${{ github.run_id }}-${{ github.run_attempt }}
